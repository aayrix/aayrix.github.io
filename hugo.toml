baseURL = "https://aayrix.github.io/"
languageCode = "en-us"
title = "Aayrix"
theme = "hugo-PaperMod"

[pagination]
pagerSize = 5

[params]
defaultTheme = "dark"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
mainSections = ["posts"]

author = "Aayrix"

[params.homeInfoParams]
Title = "Welcome to Aayrix"
Content = "Practical developer guides with copy-paste commands. Explore [Posts](/posts/), browse [Tags](/tags/), or follow me on [GitHub](https://github.com/aayrix)."

[[params.socialIcons]]
name = "github"
url = "https://github.com/aayrix"

[[params.socialIcons]]
name = "linkedin"
url = "https://linkedin.com"

