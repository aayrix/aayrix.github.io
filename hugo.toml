baseURL = "https://aayrix.github.io/"
languageCode = "en-us"
title = "Aayrix"
theme = "hugo-PaperMod"
summaryLength = 30
enableRobotsTXT = true
copyright = "© {year} Aayrix. All rights reserved."

[pagination]
pagerSize = 5

[params]
env = "production"
description = "Aayrix by Aliyan — technical documentation for Linux, GitHub, Hugo, and developer tooling. Computer Science student at FAST NUCES sharing practical, copy-ready guides."
keywords = ["Linux", "GitHub", "Hugo", "developer tutorials", "technical documentation", "Arch Linux", "Ubuntu"]
defaultTheme = "dark"
ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
mainSections = ["posts"]

author = "Aliyan"

[params.homeInfoParams]
Title = "Technical Documentation & Developer Guides"
Content = "Hi, I'm **Aliyan** — a Computer Science student at FAST NUCES and the author behind [Aayrix](https://github.com/aayrix). I write production-ready tutorials for Linux, GitHub, and static site engineering."

